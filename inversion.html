<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Grammar Challenge</title>
    <style>
        /* Colorful, modern background */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .app-container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 650px;
            width: 100%;
        }

        h1, h2 { text-align: center; color: #2d3748; }
        p.subtitle { text-align: center; color: #718096; margin-bottom: 30px; }

        /* Menu Buttons */
        .menu-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .menu-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-inversion { background: linear-gradient(to right, #f6d365 0%, #fda085 100%); }
        .btn-possession { background: linear-gradient(to right, #84fab0 0%, #8fd3f4 100%); color: #000; }
        .btn-mix { background: linear-gradient(to right, #a18cd1 0%, #fbc2eb 100%); color: #000; }

        /* Quiz UI */
        .quiz-header { display: flex; justify-content: space-between; font-weight: bold; color: #4a5568; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 20px; }
        
        .option-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #fff;
            border: 2px solid #cbd5e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            text-align: left;
            transition: all 0.2s;
        }
        .option-btn:hover:not(:disabled) { background-color: #ebf4ff; border-color: #90cdf4; }
        .option-btn:disabled { cursor: default; }
        
        /* Answer Highlights */
        .correct { background-color: #c6f6d5 !important; border-color: #48bb78 !important; color: #22543d; }
        .wrong { background-color: #fed7d7 !important; border-color: #f56565 !important; color: #742a2a; }
        
        #rationale-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #edf2f7;
            border-left: 5px solid #4299e1;
            border-radius: 4px;
            display: none;
            font-style: italic;
        }

        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .nav-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: background 0.2s;
        }
        #prev-btn { background-color: #a0aec0; }
        #prev-btn:hover { background-color: #718096; }
        #next-btn { background-color: #4299e1; }
        #next-btn:hover { background-color: #3182ce; }
        
        /* Sections */
        #quiz-area, #score-area { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="menu-area">
        <h1>Grammar Master</h1>
        <p class="subtitle">Select a category to test your skills.</p>
        <button class="menu-btn btn-inversion" onclick="startQuiz('inversion')">Inversions Only</button>
        <button class="menu-btn btn-possession" onclick="startQuiz('possession')">Possessives Only</button>
        <button class="menu-btn btn-mix" onclick="startQuiz('mix')">Mixed Challenge</button>
    </div>

    <div id="quiz-area">
        <div class="quiz-header">
            <span id="quiz-title">Quiz</span>
            <span>Question <span id="current-q-num">1</span> / <span id="total-q-num"></span></span>
        </div>
        <h2 id="question-text" style="text-align: left; font-size: 1.2rem;"></h2>
        <div id="options-area"></div>
        <div id="rationale-box"></div>
        
        <div class="nav-buttons">
            <button id="prev-btn" class="nav-btn" onclick="prevQuestion()">&#8592; Previous</button>
            <button id="next-btn" class="nav-btn" onclick="nextQuestion()">Next &#8594;</button>
        </div>
    </div>

    <div id="score-area">
        <h1>Quiz Complete!</h1>
        <p class="subtitle" style="font-size: 1.2rem;">You scored <strong id="score-text">0</strong> out of <strong id="max-score"></strong>.</p>
        <button class="menu-btn btn-mix" onclick="location.reload()">Back to Main Menu</button>
    </div>
</div>

    let activeQuiz = [];
    let userAnswers = [];
    let currentQuestionIndex = 0;

    const menuArea = document.getElementById('menu-area');
    const quizArea = document.getElementById('quiz-area');
    const scoreArea = document.getElementById('score-area');
    const questionText = document.getElementById('question-text');
    const optionsArea = document.getElementById('options-area');
    const rationaleBox = document.getElementById('rationale-box');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    function startQuiz(type) {
        if (type === 'inversion') {
            activeQuiz = [...inversionData];
            document.getElementById('quiz-title').innerText = "Inversions Quiz";
        } else if (type === 'possession') {
            activeQuiz = [...possessionData];
            document.getElementById('quiz-title').innerText = "Possessives Quiz";
        } else if (type === 'mix') {
            activeQuiz = [...inversionData, ...possessionData].sort(() => Math.random() - 0.5);
            document.getElementById('quiz-title').innerText = "Mixed Challenge";
        }

        userAnswers = new Array(activeQuiz.length).fill(null);
        currentQuestionIndex = 0;
        document.getElementById('total-q-num').innerText = activeQuiz.length;

        menuArea.style.display = 'none';
        quizArea.style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        const currentData = activeQuiz[currentQuestionIndex];
        const previousAnswer = userAnswers[currentQuestionIndex];

        document.getElementById('current-q-num').innerText = currentQuestionIndex + 1;
        questionText.innerText = currentData.question;
        
        optionsArea.innerHTML = '';
        rationaleBox.style.display = 'none';

        prevBtn.style.visibility = (currentQuestionIndex === 0) ? 'hidden' : 'visible';
        
        if (previousAnswer === null) {
            nextBtn.style.display = 'none';
        } else {
            nextBtn.style.display = 'block';
            nextBtn.innerText = (currentQuestionIndex === activeQuiz.length - 1) ? "Finish Quiz" : "Next \u2192";
        }

        currentData.answerOptions.forEach((option, index) => {
            const button = document.createElement('button');
            button.innerText = option.text;
            button.classList.add('option-btn');
            
            if (previousAnswer !== null) {
                button.disabled = true;
                if (index === previousAnswer.selectedIndex) {
                    button.classList.add(option.isCorrect ? 'correct' : 'wrong');
                }
                if (option.isCorrect) {
                    button.classList.add('correct');
                }
                rationaleBox.innerText = currentData.answerOptions[previousAnswer.selectedIndex].rationale;
                rationaleBox.style.display = 'block';
            } else {
                button.addEventListener('click', () => handleAnswer(option, index, button, currentData.answerOptions));
            }
            
            optionsArea.appendChild(button);
        });
    }

    function handleAnswer(selectedOption, selectedIndex, selectedButton, allOptions) {
        const buttons = optionsArea.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true);

        userAnswers[currentQuestionIndex] = {
            selectedIndex: selectedIndex,
            isCorrect: selectedOption.isCorrect
        };

        if (selectedOption.isCorrect) {
            selectedButton.classList.add('correct');
        } else {
            selectedButton.classList.add('wrong');
            buttons.forEach((btn, idx) => {
                if (allOptions[idx].isCorrect) btn.classList.add('correct');
            });
        }

        rationaleBox.innerText = selectedOption.rationale;
        rationaleBox.style.display = 'block';
        nextBtn.style.display = 'block';
        nextBtn.innerText = (currentQuestionIndex === activeQuiz.length - 1) ? "Finish Quiz" : "Next \u2192";
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion();
        }
    }

    function nextQuestion() {
        if (currentQuestionIndex < activeQuiz.length - 1) {
            currentQuestionIndex++;
            loadQuestion();
        } else {
            showScoreScreen();
        }
    }

    function showScoreScreen() {
        let finalScore = 0;
        userAnswers.forEach(answer => {
            if (answer && answer.isCorrect) finalScore++;
        });

        quizArea.style.display = 'none';
        scoreArea.style.display = 'block';
        document.getElementById('score-text').innerText = finalScore;
        document.getElementById('max-score').innerText = activeQuiz.length;
    }
